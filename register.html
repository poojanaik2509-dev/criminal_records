<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CRMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            color: #0f172a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 3rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }
        .login-card h2 { margin-top: 0; color: #2563eb; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #64748b; }
        .form-group input, .form-group select { 
            width: 100%; padding: 10px; background: #ffffff;
            border: 1px solid rgba(0,0,0,0.1); color: #0f172a;
            border-radius: 6px; box-sizing: border-box; font-family: 'Inter';
        }
        .btn {
            width: 100%; padding: 12px; background: #10b981; border: none;
            color: white; font-weight: 600; border-radius: 6px; cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background: #059669; }
        .flash {
            padding: 10px; border-radius: 6px; margin-bottom: 1rem;
            background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #dc2626;
        }
        .footer-link { margin-top: 1.5rem; font-size: 0.9rem; }
        .footer-link a { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2><i class="fa-solid fa-user-plus"></i> Request Access</h2>
        <p style="color: #94a3b8; margin-bottom: 2rem;">CRMS System Registration</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/register" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role">
                    <option value="User">Standard User (Public/Staff)</option>
                    <option value="Admin">Administrator (Requires Approval)</option>
                </select>
            </div>
            <button type="submit" class="btn">Register Account</button>
        </form>
        
        <div class="footer-link">
            Already have an account? <a href="/login">Return to Login</a>
        </div>
    </div>
</body>
</html>
